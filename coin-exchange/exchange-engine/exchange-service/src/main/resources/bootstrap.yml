spring:
  application:
    name: exchange-service
  cloud:
    nacos:
      server-addr: 192.168.1.202:8848
      config:
        file-extension: yaml
    stream:
      bindings:
        order_out:
          destination: order_in
          content-type: application/json
        cancel_order_in: { destination: cancel_order_out, content-type: application/plain, group: cancel-order-group, consumer.maxAttempts: 1 }
        exchange_trade_in: { destination: exchange_trades_out, content-type: application/plain, group: exchange-trade-group, consumer.maxAttempts: 1 }
      rocketmq:
        binder:
          name-server: 192.168.1.202:9876
  profiles:
    active: dev



